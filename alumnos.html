<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal del Alumno - QR Asistencia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <style>
    body {
      background-color: #f8f9fa;
    }
    header {
      background-color: #198754;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    .container {
      margin-top: 2rem;
    }
    #qrContainer {
      display: none;
      margin-top: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Portal del Alumno</h1>
    <p>Generador de código QR para asistencia</p>
  </header>  <div class="container">
    <div id="formulario">
      <h4>Ingresa tus datos</h4>
      <form id="formAlumno">
        <div class="mb-3">
          <label for="curp" class="form-label">CURP</label>
          <input type="text" class="form-control" id="curp" maxlength="18" required />
        </div>
        <div class="mb-3">
          <label for="aula" class="form-label">Aula</label>
          <input type="text" class="form-control" id="aula" required />
        </div>
        <button type="submit" class="btn btn-success">Generar QR</button>
      </form>
    </div><div id="qrContainer">
  <h5>Tu código QR personal</h5>
  <canvas id="qr"></canvas>
  <p id="infoAlumno" class="mt-3"></p>
</div>

  </div>  
  <script>
    const form = document.getElementById("formAlumno");
    const qr = new QRious({ element: document.getElementById("qr"), size: 250 });

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const curp = document.getElementById("curp").value.trim().toUpperCase();
      const aula = document.getElementById("aula").value.trim();

      if (curp.length !== 18) {
        alert("El CURP debe tener 18 caracteres.");
        return;
      }

      const dataQR = JSON.stringify({ curp, aula });
      qr.set({ value: dataQR });

      document.getElementById("formulario").style.display = "none";
      document.getElementById("qrContainer").style.display = "block";
      document.getElementById("infoAlumno").textContent = `CURP: ${curp} | Aula: ${aula}`;
    });
  </script>
  </body>
</html>
